<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#0a0c10" />
<title>Bay Departures 灣區班次 — BART + Caltrain departure board</title>
<meta name="description" content="A fast, phone-first live departure board for BART and Caltrain. Pick a station, see real countdowns — no 3D, no heavy tiles, loads instantly." />
<meta property="og:title" content="Bay Departures 灣區班次" />
<meta property="og:description" content="Live BART + Caltrain departure board — the mobile-lite companion to the SF Bay Area 3D map." />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' fill='%230a0c10'/><rect y='3' width='16' height='2.6' fill='%23ffb531'/><rect y='7' width='16' height='2.6' fill='%23ffb531' opacity='.65'/><rect y='11' width='16' height='2.6' fill='%23ffb531' opacity='.35'/></svg>" />
<style>
  :root{
    --bg:#0a0c10; --panel:#12151c; --edge:#242a36; --ink:#e8ecf4; --dim:#8b94a7;
    --amber:#ffb531; --green:#43d675; --warn:#ffc44d; --red:#ff5a5a;
    --mono:"SF Mono","Consolas","Roboto Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--bg);color:var(--ink);font-family:var(--mono);min-height:100%}
  body{max-width:640px;margin:0 auto;padding:14px 12px 20px;display:flex;flex-direction:column;gap:12px}

  /* ---------- header ---------- */
  header{display:flex;align-items:baseline;justify-content:space-between;gap:10px;padding:2px 2px 0}
  header h1{font-size:15px;letter-spacing:3px;color:var(--amber);font-weight:700;white-space:nowrap}
  header h1 small{display:block;font-size:9px;letter-spacing:2px;color:var(--dim);font-weight:400;margin-top:2px}
  #clock{font-size:12px;color:var(--dim);letter-spacing:1px;font-variant-numeric:tabular-nums}

  /* ---------- station bar ---------- */
  #stationbar{display:flex;gap:8px}
  #station-btn{flex:1;display:flex;align-items:center;gap:9px;background:var(--panel);border:1px solid var(--edge);
    border-radius:10px;padding:12px 14px;color:var(--ink);font:inherit;font-size:16px;cursor:pointer;text-align:left}
  #station-btn:active{background:#1a1f29}
  #station-btn .op{font-size:9px;letter-spacing:1px;padding:2.5px 6px;border-radius:4px;border:1px solid var(--edge);color:var(--dim);flex:0 0 auto}
  #station-btn .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #station-btn .ch{color:var(--dim);font-size:11px}
  #geo-btn{flex:0 0 auto;width:46px;background:var(--panel);border:1px solid var(--edge);border-radius:10px;color:var(--amber);font-size:17px;cursor:pointer}
  #geo-btn:active{background:#1a1f29}

  /* ---------- arrival (destination) bar ---------- */
  #destbar{display:flex;gap:8px;margin-top:-4px}
  #dest-btn{flex:1;display:flex;align-items:center;gap:9px;background:none;border:1px dashed rgba(255,181,49,.45);
    border-radius:10px;padding:9px 14px;color:var(--amber);font:inherit;font-size:13px;cursor:pointer;text-align:left}
  #dest-btn.set{background:var(--panel);border-style:solid;color:var(--ink)}
  #dest-btn:active{background:#1a1f29}
  #dest-btn .arrow{color:var(--amber);flex:0 0 auto}
  #dest-btn .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #dest-btn .ch{color:var(--dim);font-size:11px}
  #dest-clear{flex:0 0 auto;width:38px;background:var(--panel);border:1px solid var(--edge);border-radius:10px;color:var(--dim);font-size:13px;cursor:pointer}
  #dest-clear:active{background:#1a1f29}

  /* ---------- favorites bar ---------- */
  #favbar{display:flex;gap:8px;align-items:center;margin-top:-4px}
  #fav-star{flex:0 0 auto;width:38px;height:38px;background:var(--panel);border:1px solid var(--edge);border-radius:10px;color:var(--dim);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  #fav-star.on{color:var(--amber);border-color:rgba(255,181,49,.5)}
  #fav-star:active{background:#1a1f29}
  #favchips{flex:1;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
  #favchips::-webkit-scrollbar{display:none}
  #favchips:empty{display:none}
  .fav-chip{flex:0 0 auto;display:flex;align-items:center;background:var(--panel);border:1px solid var(--edge);border-radius:9px;overflow:hidden}
  .fav-chip.active{border-color:rgba(255,181,49,.6)}
  .fav-go{background:none;border:none;color:var(--ink);font:inherit;font-size:11.5px;padding:8px 4px 8px 10px;cursor:pointer;white-space:nowrap;max-width:38vw;overflow:hidden;text-overflow:ellipsis}
  .fav-chip.active .fav-go{color:var(--amber)}
  .fav-del{background:none;border:none;color:var(--dim);font-size:12px;padding:8px 9px 8px 4px;cursor:pointer}
  .fav-del:active{color:var(--red)}

  /* ---------- board ---------- */
  #board{background:var(--panel);border:1px solid var(--edge);border-radius:12px;overflow:hidden;min-height:220px}
  .bhd{display:flex;justify-content:space-between;padding:9px 14px;font-size:9.5px;letter-spacing:2px;color:var(--dim);border-bottom:1px solid var(--edge)}
  .row{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid rgba(36,42,54,.6);animation:flapin .28s ease}
  .row:last-child{border-bottom:none}
  @keyframes flapin{from{transform:translateY(-4px);opacity:0}to{transform:none;opacity:1}}
  .chip{flex:0 0 auto;min-width:54px;text-align:center;font-size:10.5px;font-weight:700;letter-spacing:.5px;
    padding:4px 7px;border-radius:5px;text-transform:uppercase}
  .dest{flex:1;min-width:0;font-size:14px;letter-spacing:.4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-transform:uppercase}
  .dest small{display:block;font-size:9px;color:var(--dim);letter-spacing:1px;margin-top:2px;text-transform:none}
  .src{flex:0 0 auto;font-size:8.5px;letter-spacing:1px;color:var(--dim)}
  .src.live{color:var(--green)}
  .src.live::before{content:"●";margin-right:3px;animation:pulse 1.6s infinite}
  @keyframes pulse{50%{opacity:.35}}
  .cd-wrap{flex:0 0 auto;min-width:72px;display:flex;flex-direction:column;align-items:flex-end;gap:1px}
  .cd{font-size:19px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:.5px}
  .cd.green{color:var(--green)} .cd.amber{color:var(--warn)}
  .cd.red{color:var(--red);animation:blink .85s steps(2,start) infinite}
  /* arrival mode: the ARRIVE column is the star — bigger than the countdown */
  .duo{flex:0 0 auto;display:flex;gap:14px;align-items:flex-end}
  .duo .col{display:flex;flex-direction:column;align-items:flex-end;gap:1px}
  .duo .col i{font-style:normal;font-size:8px;letter-spacing:1.5px;color:var(--dim)}
  .duo .cd{font-size:15px}
  .duo .arrb{font-size:23px;font-weight:700;color:var(--amber);font-variant-numeric:tabular-nums;letter-spacing:.5px}
  .row.next{background:rgba(255,181,49,.06);box-shadow:inset 3px 0 0 var(--amber)}
  /* transfer leg 2: three columns (depart clock · leave-in timer · final arrive clock) — tighter to fit */
  .trio{flex:0 0 auto;display:flex;gap:7px;align-items:flex-end}
  .trio .col{display:flex;flex-direction:column;align-items:flex-end;gap:1px}
  .trio .col i{font-style:normal;font-size:7px;letter-spacing:.5px;color:var(--dim);white-space:nowrap}
  .trio .dep{font-size:13px;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums}
  .trio .cd{font-size:13px}
  .trio .arrb{font-size:17px;font-weight:700;color:var(--amber);font-variant-numeric:tabular-nums;letter-spacing:.3px}
  .row:has(.trio) .dest{flex:0 1 auto;min-width:64px}   /* trio needs more width than dest can spare on a narrow phone */

  /* ---------- hero banner: the answer, huge (arrival mode only) ---------- */
  #hero{display:none;align-items:center;justify-content:space-between;gap:12px;padding:13px 14px;
    border-bottom:1px solid var(--edge);background:rgba(255,181,49,.08)}
  #hero.show{display:flex}
  #hero .lbl{font-size:11px;letter-spacing:2px;color:var(--amber);font-weight:700}
  #hero .sub{font-size:11px;color:var(--dim);margin-top:4px;letter-spacing:.5px}
  #hero .sub b{font-weight:700}
  #hero .sub b.green{color:var(--green)} #hero .sub b.amber{color:var(--warn)}
  #hero .sub b.red{color:var(--red);animation:blink .85s steps(2,start) infinite}
  #hero .when{font-size:42px;font-weight:700;color:var(--amber);font-variant-numeric:tabular-nums;line-height:1;letter-spacing:1px}
  @keyframes blink{50%{opacity:.2}}
  .empty{padding:34px 16px;text-align:center;color:var(--dim);font-size:12.5px;line-height:1.7}

  #status{font-size:9.5px;letter-spacing:1px;color:var(--dim);text-align:center;line-height:1.7}
  #status .err{color:var(--warn)}

  footer{margin-top:auto;padding-top:6px;text-align:center;font-size:10px;color:var(--dim);line-height:1.9}
  footer a{color:var(--amber);text-decoration:none;border-bottom:1px solid rgba(255,181,49,.4)}
  footer .fine{font-size:8.5px;letter-spacing:.3px;opacity:.75}

  /* ---------- station picker overlay ---------- */
  #picker{position:fixed;inset:0;background:rgba(6,8,12,.97);z-index:10;display:none;flex-direction:column;padding:14px 12px}
  #picker.open{display:flex}
  #picker .phd{display:flex;gap:8px;max-width:640px;width:100%;margin:0 auto 10px}
  #search{flex:1;background:var(--panel);border:1px solid var(--edge);border-radius:10px;padding:12px 14px;color:var(--ink);font:inherit;font-size:16px;outline:none}
  #search:focus{border-color:var(--amber)}
  #picker-close{flex:0 0 auto;width:46px;background:var(--panel);border:1px solid var(--edge);border-radius:10px;color:var(--dim);font-size:16px;cursor:pointer}
  #stations{flex:1;overflow-y:auto;max-width:640px;width:100%;margin:0 auto;border:1px solid var(--edge);border-radius:12px;background:var(--panel)}
  .st{display:flex;align-items:center;gap:10px;width:100%;padding:13px 14px;background:none;border:none;border-bottom:1px solid rgba(36,42,54,.6);
    color:var(--ink);font:inherit;font-size:15px;cursor:pointer;text-align:left}
  .st:active{background:#1a1f29}
  .st .op{font-size:9px;letter-spacing:1px;padding:2.5px 6px;border-radius:4px;border:1px solid var(--edge);color:var(--dim);flex:0 0 auto;min-width:44px;text-align:center}
  .op.bart{color:#39b5e8;border-color:#39b5e844} .op.ct{color:#ff6a6a;border-color:#ff6a6a44}
</style>
</head>
<body>
  <header>
    <h1>BAY DEPARTURES<small>灣區班次 · BART + CALTRAIN</small></h1>
    <div id="clock">--:--:--</div>
  </header>

  <div id="stationbar">
    <button id="station-btn" aria-label="Choose station"><span class="op"></span><span class="nm">Choose a station…</span><span class="ch">▾</span></button>
    <button id="geo-btn" title="Nearest station" aria-label="Use nearest station">📍</button>
  </div>
  <div id="destbar">
    <button id="dest-btn" aria-label="Choose arrival station"><span class="arrow">→</span><span class="nm">Set arrival station — see when you arrive</span><span class="ch">▾</span></button>
    <button id="dest-clear" title="Clear arrival station" aria-label="Clear arrival station" hidden>✕</button>
  </div>
  <div id="favbar">
    <button id="fav-star" title="Save this route" aria-label="Save current selection as favorite">☆</button>
    <div id="favchips"></div>
  </div>

  <div id="board">
    <div class="bhd"><span>LINE&nbsp;/&nbsp;DESTINATION</span><span id="bhd-right">DEPARTS&nbsp;IN</span></div>
    <div id="hero">
      <div><div class="lbl" id="hero-lbl"></div><div class="sub" id="hero-sub"></div></div>
      <div class="when" id="hero-when"></div>
    </div>
    <div id="rows"><div class="empty">Pick a station to see departures.</div></div>
  </div>

  <div id="status"></div>

  <footer>
    <div>Prefer the interactive 3D map? <a href="https://icomppower.github.io/sf-bay-transit-3d" rel="noopener">SF Bay Area 3D →</a></div>
    <div class="fine">Live data: BART (api.bart.gov) · Caltrain via 511.org. Schedule fallback: official GTFS.<br>
      Built by <a href="https://www.linkedin.com/in/icomppower" rel="noopener">Johnny Lai</a> · <a href="https://github.com/icomppower" rel="noopener">icomppower</a></div>
  </footer>

  <div id="picker">
    <div class="phd">
      <input id="search" type="search" placeholder="Search stations…" autocomplete="off" />
      <button id="picker-close" aria-label="Close">✕</button>
    </div>
    <div id="stations"></div>
  </div>

<script src="data.js"></script>
<script>
(() => {
"use strict";
const D = window.BOARD_DATA;
const $ = id => document.getElementById(id);
const PROXY = "https://sf-bay-transit-proxy.vercel.app/api/caltrain-live";
const BART_API = "https://api.bart.gov/api/etd.aspx";
const BART_KEY = "MW9S-E7SL-26DU-VV8V";   // BART's long-standing public demo key
const LS_KEY = "bay_departures_station";
const LS_DEST = "bay_departures_dest";
const LS_FAVS = "bay_departures_favs";
const MAX_ROWS = 10;

/* ---- Pacific clock: the schedule is in America/Los_Angeles seconds-since-midnight,
 *  and a visitor anywhere in the world must see BART's clock, not their own. ---- */
const tzFmt = new Intl.DateTimeFormat("en-US", { timeZone: "America/Los_Angeles", hour12: false, hour: "2-digit", minute: "2-digit", second: "2-digit" });
function nowSeconds(){
  const p = tzFmt.formatToParts(new Date()), g = t => +p.find(x => x.type === t).value;
  return (g("hour") % 24) * 3600 + g("minute") * 60 + g("second");
}
const fmtClock = s => [s/3600, s/60 % 60, s % 60].map(v => String(Math.floor(v)).padStart(2, "0")).join(":");

/* ---- countdown urgency bands: green > 5 min, amber 2–5, flashing red < 2 ---- */
function countdown(ms){
  const s = Math.max(0, Math.round(ms / 1000));
  const label = s >= 3600 ? Math.floor(s/3600) + "h" + String(Math.floor(s/60) % 60).padStart(2, "0")
              : s < 30 ? "DUE"
              : Math.floor(s/60) + ":" + String(s % 60).padStart(2, "0");
  return { s, label, cls: s > 300 ? "green" : s >= 120 ? "amber" : "red" };
}

/* ---- state ---- */
let station = null;          // entry from D.stations
let destSt = null;           // optional arrival station — filters rows + adds arrival times
let liveRows = null;         // [{k, color, text, dest, note, eta(ms epoch), li, term}] or null when live unavailable
let liveErr = "";            // human-readable live-source note for the status line
let fetchTimer = null;
let favs = [];                // saved routes: [{s: stationId, d: destStationId|null}], "My Routes"-style favorites

const byId = {}; D.stations.forEach(s => byId[s.id] = s);
const idxById = {}; D.stations.forEach((s, i) => idxById[s.id] = i);
const idxByBart = {}; D.stations.forEach((s, i) => { if(s.op === "bart") idxByBart[s.code] = i; });
const idxByCtCode = {}; D.stations.forEach((s, i) => { if(s.codes) for(const c of s.codes) idxByCtCode[c] = i; });
const lineByOpK = {}, lineIdxByOpK = {};
D.lines.forEach((l, i) => { lineByOpK[l.op + ":" + l.k.toLowerCase()] = l; lineIdxByOpK[l.op + ":" + l.k.toLowerCase()] = i; });

/* ---- one-way fare lookup: a pure O-D price (neither operator prices by route/line taken) ---- */
const fareFor = (a, b) => { const v = (D.fare || {})[idxById[a.id] + ">" + idxById[b.id]]; return v == null ? null : v; };
const fmtFare = v => "$" + v.toFixed(2);

/* ---- arrival-time mode: real scheduled travel times between station pairs (per line) ---- */
const ttOf = (li, o, d) => (D.tt[li] || {})[o + ">" + d];
/* does this train actually reach the arrival station? The train's own terminal tells its
 * direction: valid iff the arrival station lies between here and that terminal on this line
 * (travel times must exist and be additive — a skip-stop express that misses it fails here). */
function reaches(r, o, d){
  if(r.li == null || r.li < 0 || r.term == null || r.term < 0) return false;
  const od = ttOf(r.li, o, d); if(od == null) return false;
  if(r.term === d) return true;
  const dt = ttOf(r.li, d, r.term), ot = ttOf(r.li, o, r.term);
  return dt != null && ot != null && Math.abs(ot - (od + dt)) < 300;
}
const ptHM = new Intl.DateTimeFormat("en-US", { timeZone: "America/Los_Angeles", hour12: false, hour: "2-digit", minute: "2-digit" });
const fmtArr = ms => ptHM.format(new Date(ms)).replace(/^24/, "00");

/* ---- one-transfer routing (BART only — Caltrain's Local/Limited/Express share one
 *  corridor, no "wrong line" to change off of; a station pair with no direct BART line,
 *  e.g. Antioch <-> Dublin/Pleasanton, otherwise showed nothing at all). stationLines[i]
 *  is every line index that stops at station i, derived once from the travel-time table. ---- */
const stationLines = D.stations.map(() => new Set());
for(const [li, pairs] of Object.entries(D.tt))
  for(const key of Object.keys(pairs)){ const [o, d] = key.split(">").map(Number);
    stationLines[o].add(+li); stationLines[d].add(+li); }
const TRANSFER_BUFFER_S = 90;   // minimum time to cross a BART platform for a same-station transfer
/* best one-transfer route via any station serving both an origin line and a (different)
 * destination line; leg 1 comes from the origin's already-fetched departures (live when
 * available), leg 2 from the connecting station's own scheduled weekday departures — the
 * same "real GTFS timetable as an honest estimate" approach used for BART Runner in
 * sf-bay-transit-3d, re-derived independently here per this project's no-shared-code rule. */
function findTransfer(originRows, oIdx, dIdx){
  if(station.op !== "bart" || !destSt || destSt.op !== "bart") return null;
  const oLines = stationLines[oIdx], dLines = stationLines[dIdx];
  let best = null;
  for(let via = 0; via < D.stations.length; via++){
    if(via === oIdx || via === dIdx || D.stations[via].op !== "bart") continue;
    const viaLines = stationLines[via];
    let leg1 = null;
    for(const r of originRows){ if(!oLines.has(r.li) || !viaLines.has(r.li)) continue;
      if(!reaches(r, oIdx, via)) continue; if(!leg1 || r.eta < leg1.eta) leg1 = r; }
    if(!leg1) continue;
    const leg1Arr = leg1.eta + ttOf(leg1.li, oIdx, via) * 1000;
    const readyAt = leg1Arr + TRANSFER_BUFFER_S * 1000;
    const readySec = nowSeconds() + Math.round((readyAt - Date.now()) / 1000);
    let leg2 = null;
    for(const [t, li, di, term] of (D.sched[D.stations[via].id] || [])){
      if(t < readySec) continue; if(li === leg1.li) continue;   // same line = ride-through, not a transfer
      if(!dLines.has(li) || !viaLines.has(li)) continue;
      if(!reaches({ li, term }, via, dIdx)) continue;
      leg2 = { eta: readyAt + (t - readySec) * 1000, li, dest: D.dests[di], k: D.lines[li].k, color: D.lines[li].color, text: D.lines[li].text };
      break;   // D.sched rows are time-sorted, so the first match is the earliest
    }
    if(!leg2) continue;
    const arr = leg2.eta + ttOf(leg2.li, via, dIdx) * 1000;
    if(!best || arr < best.arr) best = { via, leg1, leg2, leg1Arr, arr };
  }
  return best;
}

/* ---- live: BART ETD (direct client-side; CORS is open on api.bart.gov) ---- */
async function fetchBart(st){
  const u = `${BART_API}?cmd=etd&orig=${st.code}&key=${BART_KEY}&json=y`;
  const r = await fetch(u); if(!r.ok) throw new Error("BART API " + r.status);
  const j = await r.json();
  const etds = j?.root?.station?.[0]?.etd || [];
  const now = Date.now(), rows = [];
  for(const e of etds) for(const est of (e.estimate || [])){
    if(est.cancelflag === "1") continue;
    const min = est.minutes === "Leaving" ? 0 : parseInt(est.minutes, 10);
    if(Number.isNaN(min)) continue;
    const name = (est.color || "").toLowerCase();
    rows.push({ k: name ? name[0].toUpperCase() + name.slice(1) : "BART",
      color: est.hexcolor || "#8b94a7", text: pickText(est.hexcolor),
      dest: e.destination, note: "Platform " + est.platform + (est.length ? " · " + est.length + " cars" : ""),
      eta: now + min * 60000,
      li: lineIdxByOpK["bart:" + name] ?? -1, term: idxByBart[e.abbreviation] ?? -1 });
  }
  return rows;
}
const pickText = hex => { if(!hex) return "#000";
  const n = parseInt(hex.replace("#",""), 16), lum = 0.299*((n>>16)&255) + 0.587*((n>>8)&255) + 0.114*(n&255);
  return lum > 140 ? "#000" : "#fff"; };

/* ---- live: Caltrain via the deployed 511 proxy (one call per platform code) ---- */
async function fetchCaltrain(st){
  const now = Date.now(), rows = [];
  for(const code of st.codes){
    const r = await fetch(`${PROXY}?stopCode=${code}`); if(!r.ok) throw new Error("proxy " + r.status);
    const j = await r.json();
    const visits = j?.ServiceDelivery?.StopMonitoringDelivery?.MonitoredStopVisit || [];
    for(const v of visits){
      const mvj = v.MonitoredVehicleJourney || {}, call = mvj.MonitoredCall || {};
      const t = call.ExpectedDepartureTime || call.ExpectedArrivalTime || call.AimedDepartureTime || call.AimedArrivalTime;
      if(!t) continue;
      const eta = Date.parse(t); if(!(eta > now - 60000)) continue;
      // Caltrain's live feed reports "Local Weekend" on Sat/Sun (a separate GTFS route from "Local
      // Weekday" for the same stopping pattern) — strip any day-type suffix to match the collapsed
      // line key build-data.mjs generates, or the chip/color and arrival-mode filtering both break.
      const lk = (mvj.LineRef || "").replace(/\s*(Weekday|Weekend|Saturday|Sunday)$/i, "");
      const line = lineByOpK["ct:" + lk.toLowerCase()];
      rows.push({ k: lk || "Caltrain", color: line ? line.color : "#ce202f", text: line ? line.text : "#fff",
        dest: (mvj.DestinationName || "").replace(/\s*Caltrain Station\s*(North|South)bound$/i, "").replace(/\s*(North|South)bound$/i, ""),
        note: mvj.DirectionRef === "N" ? "Northbound" : mvj.DirectionRef === "S" ? "Southbound" : "",
        eta,
        li: lineIdxByOpK["ct:" + lk.toLowerCase()] ?? -1, term: idxByCtCode[mvj.DestinationRef] ?? -1 });
    }
  }
  return rows;
}

/* ---- scheduled fallback rows (official weekday GTFS, Pacific clock) ---- */
function schedRows(st){
  const list = D.sched[st.id] || [], now = nowSeconds(), t0 = Date.now();
  const out = [];
  for(const [t, li, di, term] of list){
    if(t < now) continue;
    const L = D.lines[li];
    out.push({ k: L.k, color: L.color, text: L.text, dest: D.dests[di], note: "", eta: t0 + (t - now) * 1000, sched: true, li, term });
    if(out.length >= 40) break;   // over-collect; the arrival filter below may discard many
  }
  return out;
}

/* ---- fetch cycle: BART every 30 s, Caltrain every 60 s (511 token is rate-limited) ---- */
async function refresh(){
  if(!station) return;
  try{
    liveRows = station.op === "bart" ? await fetchBart(station) : await fetchCaltrain(station);
    liveErr = "";
  }catch(e){ liveRows = null; liveErr = (station.op === "bart" ? "BART" : "Caltrain") + " live unavailable — showing schedule"; }
  render();
}
function armFetch(){
  clearInterval(fetchTimer);
  refresh();
  fetchTimer = setInterval(refresh, station && station.op === "bart" ? 30000 : 60000);
}

/* ---- render ---- */
const esc = s => String(s).replace(/[&<>"]/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;" }[c]));
function render(){
  $("clock").textContent = fmtClock(nowSeconds()) + " PT";
  if(!station) return;
  const now = Date.now();
  const originRows = (liveRows && liveRows.length) ? liveRows.filter(r => r.eta > now - 30000) : schedRows(station);
  let rows = originRows, transfer = null;
  if(destSt){   // arrival mode: only trains that genuinely reach the arrival station, each with its arrival time
    const o = idxById[station.id], d = idxById[destSt.id];
    rows = originRows.filter(r => reaches(r, o, d)).map(r => ({ ...r, arr: r.eta + ttOf(r.li, o, d) * 1000 }));
    if(!rows.length) transfer = findTransfer(originRows, o, d);   // no direct line — try one BART transfer
  }
  rows = rows.slice().sort((a,b) => a.eta - b.eta).slice(0, MAX_ROWS);
  const live = liveRows && liveRows.length > 0;
  $("bhd-right").innerHTML = destSt ? "LEAVE&nbsp;IN&nbsp;·&nbsp;ARRIVE&nbsp;AT" : "DEPARTS&nbsp;IN";
  /* hero: the next qualifying train's (or transfer's) arrival, huge — "you will be at DALY CITY at 00:20" */
  const r0 = destSt && rows[0];
  $("hero").classList.toggle("show", !!(r0 || transfer));
  if(r0){
    const cd0 = countdown(r0.eta - now);
    const fare = fareFor(station, destSt);
    $("hero-lbl").textContent = "→ YOU ARRIVE " + destSt.name.toUpperCase();
    $("hero-when").textContent = fmtArr(r0.arr);
    $("hero-sub").innerHTML = `${esc(r0.k)} · leave in <b class="${cd0.cls}">${cd0.label}</b>${r0.sched ? " · scheduled" : " · live"}${fare != null ? ` · <b>${fmtFare(fare)}</b>` : ""}`;
  } else if(transfer){
    const cd0 = countdown(transfer.leg1.eta - now);
    const via = D.stations[transfer.via];
    const f1 = fareFor(station, via), f2 = fareFor(via, destSt);
    const fareStr = (f1 != null && f2 != null) ? ` · <b>${fmtFare(f1 + f2)}</b>` : "";
    $("hero-lbl").textContent = "→ YOU ARRIVE " + destSt.name.toUpperCase();
    $("hero-when").textContent = fmtArr(transfer.arr);
    $("hero-sub").innerHTML = `1 transfer via ${esc(via.name)} · leave in <b class="${cd0.cls}">${cd0.label}</b>${fareStr}`;
  }
  if(rows.length){
    $("rows").innerHTML = rows.map((r, i) => {
      const cd = countdown(r.eta - now);
      /* arrival mode: DEP + ARR as two labelled equal-size columns (the per-row LIVE/SCHED
       * tag moves into the note line — the times need the width more than the tag does) */
      const right = r.arr
        ? `<span class="duo"><span class="col"><i>LEAVE&nbsp;IN</i><span class="cd ${cd.cls}">${cd.label}</span></span>` +
          `<span class="col"><i>ARRIVE</i><span class="arrb">${fmtArr(r.arr)}</span></span></span>`
        : `<span class="src ${r.sched ? "" : "live"}">${r.sched ? "SCHED" : "LIVE"}</span>` +
          `<span class="cd-wrap"><span class="cd ${cd.cls}">${cd.label}</span></span>`;
      const note = (r.arr ? (r.sched ? "scheduled" : "live") + (r.note ? " · " : "") : "") + (r.note || "");
      return `<div class="row${r.arr && i === 0 ? " next" : ""}">` +
        `<span class="chip" style="background:${esc(r.color)};color:${esc(r.text)}">${esc(r.k)}</span>` +
        `<span class="dest">${esc(r.dest)}${note ? `<small>${esc(note)}</small>` : ""}</span>` +
        right + `</div>`;
    }).join("");
  } else if(transfer){
    // leg A: your ride to the transfer station — leave-in timer + the clock time you get there
    // (the "via {station}" name is already the note text below, so the column label stays short)
    const cdA = countdown(transfer.leg1.eta - now);
    const rowA = `<div class="row"><span class="chip" style="background:${esc(transfer.leg1.color)};color:${esc(transfer.leg1.text)}">${esc(transfer.leg1.k)}</span>` +
      `<span class="dest">${esc(transfer.leg1.dest)}<small>toward ${esc(transfer.leg1.dest)}</small></span>` +
      `<span class="duo"><span class="col"><i>LEAVE&nbsp;IN</i><span class="cd ${cdA.cls}">${cdA.label}</span></span>` +
      `<span class="col"><i>TRANSFER</i><span class="arrb">${fmtArr(transfer.leg1Arr)}</span></span></span></div>`;
    // leg B: the connecting train — its own clock DEPART time, a leave-in timer to that departure
    // (same style as every other row on the board), and the final destination clock time
    const cdB = countdown(transfer.leg2.eta - now);
    const rowB = `<div class="row"><span class="chip" style="background:${esc(transfer.leg2.color)};color:${esc(transfer.leg2.text)}">${esc(transfer.leg2.k)}</span>` +
      `<span class="dest">${esc(transfer.leg2.dest)}<small>change at ${esc(D.stations[transfer.via].name)}</small></span>` +
      `<span class="trio"><span class="col"><i>DEPART</i><span class="dep">${fmtArr(transfer.leg2.eta)}</span></span>` +
      `<span class="col"><i>LEAVE&nbsp;IN</i><span class="cd ${cdB.cls}">${cdB.label}</span></span>` +
      `<span class="col"><i>ARRIVE</i><span class="arrb">${fmtArr(transfer.arr)}</span></span></span></div>`;
    $("rows").innerHTML =
      `<div class="empty" style="padding:10px 16px;text-align:left;color:var(--dim)">No direct line — connecting via ${esc(D.stations[transfer.via].name)}:</div>` +
      rowA + rowB;
  } else {
    $("rows").innerHTML = destSt
      ? `<div class="empty">No trains to ${esc(destSt.name)} right now (checked direct + one transfer).<br>Clear the arrival station to see all departures.</div>`
      : `<div class="empty">No more departures today at this station.<br>(Weekday schedule — service resumes ~5 am Pacific.)</div>`;
  }
  $("status").innerHTML =
    (liveErr ? `<span class="err">${esc(liveErr)}</span> · ` : live ? "live data · " : "official weekday schedule · ") +
    "updated " + fmtClock(nowSeconds()) + " PT";
}
/* countdown tick: cheap re-render every second (rows are tiny) */
setInterval(render, 1000);

/* ---- station selection ---- */
function setStation(s, save = true){
  station = s;
  $("station-btn").querySelector(".nm").textContent = s.name;
  const op = $("station-btn").querySelector(".op");
  op.textContent = s.op === "bart" ? "BART" : "CALTRAIN"; op.className = "op " + s.op;
  if(destSt && (destSt.op !== s.op || destSt.id === s.id)) setDest(null, save);   // arrival must be same operator, and not the origin itself
  else if(destSt) setDest(destSt, false);   // origin changed but arrival still valid — refresh its fare label
  if(save){ try{ localStorage.setItem(LS_KEY, s.id); }catch(e){} }
  liveRows = null; liveErr = "";
  $("rows").innerHTML = `<div class="empty">Loading departures…</div>`;
  armFetch();
  renderFavs();
}
function setDest(s, save = true){
  destSt = s;
  const fare = s && station ? fareFor(station, s) : null;
  $("dest-btn").querySelector(".nm").textContent = s ? "Arrival: " + s.name + (fare != null ? ` · ${fmtFare(fare)}` : "") : "Set arrival station — see when you arrive";
  $("dest-btn").classList.toggle("set", !!s);
  $("dest-clear").hidden = !s;
  if(save){ try{ s ? localStorage.setItem(LS_DEST, s.id) : localStorage.removeItem(LS_DEST); }catch(e){} }
  render();
  renderFavs();
}
$("dest-clear").onclick = () => setDest(null);

/* ---- favorites ("My Routes"): save the current station (or station→destination pair)
 *  for one-tap recall — Bay Departures otherwise only remembers the single last-used pick. ---- */
function loadFavs(){ try{ favs = JSON.parse(localStorage.getItem(LS_FAVS) || "[]"); }catch(e){ favs = []; } }
function saveFavs(){ try{ localStorage.setItem(LS_FAVS, JSON.stringify(favs)); }catch(e){} }
const favIdx = () => station ? favs.findIndex(f => f.s === station.id && (f.d || null) === (destSt ? destSt.id : null)) : -1;
const favLabel = f => { const s = byId[f.s], d = f.d && byId[f.d]; return d ? s.name + " → " + d.name : s.name; };
function renderFavs(){
  const idx = favIdx();
  $("fav-star").classList.toggle("on", idx !== -1);
  $("fav-star").textContent = idx !== -1 ? "★" : "☆";
  $("favchips").innerHTML = favs.map((f, i) => {
    const active = i === idx;
    return `<span class="fav-chip${active ? " active" : ""}"><button class="fav-go" data-idx="${i}">${esc(favLabel(f))}</button><button class="fav-del" data-idx="${i}" aria-label="Remove favorite">×</button></span>`;
  }).join("");
}
$("fav-star").onclick = () => {
  if(!station) return;
  const idx = favIdx();
  if(idx !== -1) favs.splice(idx, 1);
  else favs.push({ s: station.id, d: destSt ? destSt.id : null });
  saveFavs(); renderFavs();
};
$("favchips").onclick = e => {
  const del = e.target.closest(".fav-del");
  if(del){ favs.splice(+del.dataset.idx, 1); saveFavs(); renderFavs(); return; }
  const go = e.target.closest(".fav-go");
  if(go){ const f = favs[+go.dataset.idx]; if(!f || !byId[f.s]) return;
    setStation(byId[f.s]); setDest(f.d && byId[f.d] ? byId[f.d] : null); }
};

/* ---- picker overlay (shared by origin + arrival pick) ---- */
let pickMode = "origin";
const sorted = D.stations.slice().sort((a,b) => a.op.localeCompare(b.op) || a.name.localeCompare(b.name));
function paintList(q = ""){
  const needle = q.trim().toLowerCase();
  const pool = pickMode === "dest" ? sorted.filter(s => station && s.op === station.op && s.id !== station.id) : sorted;
  const hits = pool.filter(s => !needle || s.name.toLowerCase().includes(needle));
  $("stations").innerHTML = hits.map(s =>
    `<button class="st" data-id="${esc(s.id)}"><span class="op ${s.op}">${s.op === "bart" ? "BART" : "CT"}</span>${esc(s.name)}</button>`
  ).join("") || `<div class="empty">No station matches “${esc(q)}”.</div>`;
}
function openPicker(mode){
  pickMode = mode;
  $("search").placeholder = mode === "dest" ? "Search arrival stations…" : "Search stations…";
  $("picker").classList.add("open"); paintList(); $("search").value = ""; $("search").focus();
}
$("station-btn").onclick = () => openPicker("origin");
$("dest-btn").onclick = () => openPicker("dest");
$("picker-close").onclick = () => $("picker").classList.remove("open");
$("search").oninput = e => paintList(e.target.value);
$("stations").onclick = e => { const b = e.target.closest(".st"); if(!b) return;
  if(pickMode === "dest") setDest(byId[b.dataset.id]); else setStation(byId[b.dataset.id]);
  $("picker").classList.remove("open"); };

/* ---- nearest station (explicit tap only — never auto-prompt for location) ---- */
$("geo-btn").onclick = () => {
  if(!navigator.geolocation) return;
  $("geo-btn").textContent = "…";
  navigator.geolocation.getCurrentPosition(pos => {
    const { latitude: la, longitude: lo } = pos.coords;
    let best = null, bd = 1e9;
    for(const s of D.stations){
      const dLat = (s.lat - la) * 111.32, dLon = (s.lon - lo) * 111.32 * Math.cos(la * Math.PI / 180);
      const d = dLat*dLat + dLon*dLon; if(d < bd){ bd = d; best = s; }
    }
    $("geo-btn").textContent = "📍";
    if(best) setStation(best);
  }, () => { $("geo-btn").textContent = "📍"; }, { timeout: 8000 });
};

/* ---- boot: restore last station (+ arrival), else default to Embarcadero ---- */
let saved = null, savedDest = null;
try{ saved = localStorage.getItem(LS_KEY); savedDest = localStorage.getItem(LS_DEST); }catch(e){}
loadFavs();
setStation(byId[saved] || byId["bart:EMBR"] || sorted[0], false);
if(savedDest && byId[savedDest] && byId[savedDest].op === station.op && savedDest !== station.id) setDest(byId[savedDest], false);
})();
</script>
</body>
</html>
